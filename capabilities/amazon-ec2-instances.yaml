      with:
        InstanceId: tools.InstanceId
        IncludeAllInstances: tools.IncludeAllInstances
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-ec2-describe-ec2-instances
      description: Amazon EC2 Describe EC2 Instances
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-ec2-instances.describeinstances
      with:
        InstanceId: tools.InstanceId
